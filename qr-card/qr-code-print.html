  <!--
    Print-ready version of ../qr-code.html.
    QR is inlined as vector SVG so the resulting PDF is fully vector
    (only the brand logo PNG is raster — no SVG version exists in assets/).

    Encodes: https://niv-coffee.danielhadar.com/?ref=qr

    Three colour variants, selected via ?theme=… query string:
      default      → white card on white page
      cream-card   → cream card on white page
      cream-bg     → white card on cream page

    Build all three PDFs at once:
      ./build-pdfs.sh

    Regenerate the QR SVG (only if the URL ever changes):
      python3 -c "
      import qrcode, io
      from qrcode.image.svg import SvgPathImage
      qr = qrcode.QRCode(error_correction=qrcode.constants.ERROR_CORRECT_H, box_size=10, border=0)
      qr.add_data('https://niv-coffee.danielhadar.com/?ref=qr')
      qr.make(fit=True)
      buf = io.BytesIO(); qr.make_image(image_factory=SvgPathImage).save(buf)
      print(buf.getvalue().decode())
      "
    Then paste the <svg>...</svg> block below into #qr-container.
  -->

  <script>
    // Theme selector — runs synchronously before paint
    (function () {
      var t = new URLSearchParams(location.search).get('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <style>
    :root {
      --green: #3F5C38;
      --coral: #EA9580;
      --cream: #F4EBD2;
      --font: 'Alef', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    @page { size: A4 portrait; margin: 0; }

    /* Theme variants — see header comment for query-string usage. */
    html[data-theme="cream-card"] .qr-card { background: var(--cream); }
    html[data-theme="cream-bg"] body { background: var(--cream); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; }

    body {
      font-family: var(--font);
      font-weight: 700;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .qr-card {
      background: #FFFFFF;
      border: 1.5px solid var(--green);
      border-radius: 18px;
      padding: 1.4cm 1.2cm 1.6cm;
      text-align: center;
      width: 10cm;
      position: relative;
    }

    .qr-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 4px;
      border-radius: 0 0 4px 4px;
      background: var(--coral);
    }

    .brand-logo {
      display: block;
      width: 80%;
      max-width: 6.4cm;
      height: auto;
      margin: 0.2cm auto 0.4cm;
    }

    .divider {
      width: 64px;
      height: 1px;
      background: var(--coral);
      opacity: 0.85;
      margin: 0.55cm auto 0.6cm;
    }

    .qr-title {
      font-size: 13pt;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 0.1cm;
    }

    .qr-subtitle {
      font-size: 10.5pt;
      font-weight: 400;
      color: var(--green);
      opacity: 0.85;
      margin-bottom: 0.55cm;
    }

    #qr-container {
      display: flex;
      justify-content: center;
      padding: 0.25cm;
      background: #FFFFFF;
      border-radius: 14px;
      border: 1px solid rgba(63, 92, 56, 0.18);
      width: fit-content;
      margin: 0 auto;
    }

    #qr-container svg {
      display: block;
      width: 5.5cm;
      height: 5.5cm;
    }
  </style>
</head>
